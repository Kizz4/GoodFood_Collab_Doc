<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Food - Profil</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .phone-screen {
            padding-bottom: 100px;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #FFD93D 0%, #FF9F43 100%);
            overflow: hidden;
            box-shadow: var(--shadow-medium);
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .profile-avatar::after {
            content: '';
            width: 70%;
            height: 85%;
            background: #FFA07A;
            border-radius: 50% 50% 0 0;
        }

        .profile-title {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 700;
        }

        .vehicle-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
        }

        .vehicle-icon {
            font-size: 24px;
        }

        .vehicle-name {
            font-weight: 600;
        }

        .availability-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
        }

        .comment-input {
            margin: 0 16px 16px;
            padding: 12px 16px;
            background: var(--bg-main);
            border: none;
            border-radius: var(--radius-sm);
            width: calc(100% - 32px);
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            color: var(--text-dark);
        }

        .comment-input::placeholder {
            color: var(--text-light);
        }

        .comment-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--primary-purple);
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="phone-frame">
            <div class="phone-screen">
                <div class="screen">
                    <div class="profile-header">
                        <div class="profile-avatar"></div>
                        <h1 class="profile-title">Profil</h1>
                    </div>

                    <h3 class="section-title">Informations personnelles</h3>
                    <div class="info-section">
                        <div class="info-row">
                            <span class="info-label">Nom</span>
                            <span class="info-value">Jérôme Durand</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">E-mail</span>
                            <span class="info-value">jerome.durand@email.com</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Téléphone</span>
                            <span class="info-value">+33 6 71 00 00 00</span>
                        </div>
                    </div>

                    <h3 class="section-title">Véhicule</h3>
                    <div class="info-section">
                        <div class="vehicle-badge">
                            <span class="vehicle-icon">🛵</span>
                            <span class="vehicle-name">Scooter</span>
                        </div>
                    </div>

                    <h3 class="section-title">Disponibilité</h3>
                    <div class="info-section">
                        <div class="availability-row">
                            <span class="info-label">Disponible</span>
                            <div class="toggle-switch active" onclick="this.classList.toggle('active')"></div>
                        </div>
                        <input type="text" class="comment-input" placeholder="Ajoutez un commentaire...">
                    </div>

                    <a href="02-auth.html" class="btn-primary btn-red">Se déconnecter</a>
                </div>
            </div>

            <!-- Navigation Footer -->
            <nav class="nav-footer">
                <a href="03-overview.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                        <polyline points="9,22 9,12 15,12 15,22"/>
                    </svg>
                    Accueil
                </a>
                <a href="04-new-course.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 8v8M8 12h8"/>
                    </svg>
                    Course
                </a>
                <a href="#">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    Historique
                </a>
                <a href="10-profile.html" class="active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    Profil
                </a>
            </nav>
        </div>
    </div>
</body>
</html>
