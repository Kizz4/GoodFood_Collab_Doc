<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Food - Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .phone-screen {
            padding-bottom: 100px;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="phone-frame">
            <div class="phone-screen">
                <div class="screen">
                    <div class="header">
                        <a href="03-overview.html" class="logo">
                            <img src="logo.png" alt="Good Food">
                        </a>
                        <a href="10-profile.html" class="avatar">
                            <div class="avatar-inner"></div>
                        </a>
                    </div>

                    <div class="availability-toggle">
                        <button class="toggle-option active" onclick="setAvailability(this)">Disponible</button>
                        <button class="toggle-option" onclick="setAvailability(this)">Indisponible</button>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 6L9 17l-5-5"/>
                                </svg>
                            </div>
                            <div class="stat-label">Livraisons<br>aujourd'hui</div>
                            <div class="stat-value">12 <small>terminées</small></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/>
                                    <path d="M12 6v12M6 12h12"/>
                                </svg>
                            </div>
                            <div class="stat-label">Gains<br>aujourd'hui</div>
                            <div class="stat-value">€87,50</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/>
                                    <path d="M12 6v6l4 2"/>
                                </svg>
                            </div>
                            <div class="stat-label">Temps en ligne</div>
                            <div class="stat-value">4h<small>15</small>min</div>
                        </div>
                    </div>

                    <a href="04-new-course.html" class="btn-primary">Nouvelle course</a>

                    <h3 class="section-title">Détails du jour</h3>
                    <div class="menu-card">
                        <a href="05-detail.html" class="menu-item">
                            <div class="menu-icon">🛵</div>
                            <span class="menu-text">Courses en cours</span>
                            <span class="menu-arrow">›</span>
                        </a>
                        <a href="#" class="menu-item">
                            <div class="menu-icon">📋</div>
                            <span class="menu-text">Historique des courses</span>
                            <span class="menu-arrow">›</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Navigation Footer -->
            <nav class="nav-footer">
                <a href="03-overview.html" class="active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                        <polyline points="9,22 9,12 15,12 15,22"/>
                    </svg>
                    Accueil
                </a>
                <a href="04-new-course.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 8v8M8 12h8"/>
                    </svg>
                    Course
                </a>
                <a href="#">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    Historique
                </a>
                <a href="10-profile.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    Profil
                </a>
            </nav>
        </div>
    </div>

    <script>
        function setAvailability(element) {
            document.querySelectorAll('.toggle-option').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
