<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Food - Détails Course</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .detail-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-medium);
            margin-bottom: 20px;
        }

        .detail-section {
            margin-bottom: 24px;
        }

        .detail-section:last-child {
            margin-bottom: 0;
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .detail-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .detail-icon.green {
            background: var(--accent-green);
            color: white;
        }

        .detail-icon.purple {
            background: #F0EEFF;
            color: var(--primary-purple);
        }

        .detail-label {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-medium);
        }

        .detail-content {
            background: var(--bg-main);
            border-radius: var(--radius-sm);
            padding: 16px;
        }

        .detail-restaurant {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .detail-restaurant-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #FFF5E6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .detail-restaurant-name {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 16px;
        }

        .detail-restaurant-address {
            font-size: 13px;
            color: var(--text-medium);
        }

        .detail-address-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: #F0EEFF;
            border-radius: 6px;
            margin-right: 10px;
            font-size: 14px;
        }

        .detail-ref {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
        }

        .detail-time {
            font-size: 15px;
        }

        .detail-time span {
            color: var(--primary-purple);
            font-weight: 600;
        }

        .btn-primary svg {
            vertical-align: middle;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="phone-frame">
            <div class="phone-screen">
                <div class="screen">
                    <div class="header">
                        <a href="04-new-course.html" class="header-back">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 18l-6-6 6-6"/>
                            </svg>
                        </a>
                        <h1 class="header-title">Détails <span>course</span></h1>
                        <a href="10-profile.html" class="avatar">
                            <div class="avatar-inner"></div>
                            <span class="avatar-badge">2</span>
                        </a>
                    </div>

                    <div class="detail-card">
                        <div class="detail-section">
                            <div class="detail-header">
                                <div class="detail-icon green">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                                        <path d="M20 6L9 17l-5-5"/>
                                    </svg>
                                </div>
                                <span class="detail-label">À récupérer</span>
                            </div>
                            <div class="detail-content">
                                <div class="detail-restaurant">
                                    <div class="detail-restaurant-icon">🌮</div>
                                    <div>
                                        <div class="detail-restaurant-name">Taco Loco</div>
                                        <div class="detail-restaurant-address">22 Rue des Lilas, 75015 Paris</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="detail-section">
                            <div class="detail-header">
                                <div class="detail-icon purple">📍</div>
                                <span class="detail-label">À livrer</span>
                            </div>
                            <div class="detail-content">
                                <span class="detail-address-icon">🏠</span>
                                <span style="font-size:15px;font-weight:600;">12 Rue des Fleurs, <span style="color:var(--text-medium);font-weight:400;">75003 Paris</span></span>
                            </div>
                        </div>

                        <div class="detail-section">
                            <div class="detail-header">
                                <div class="detail-icon purple">📄</div>
                                <span class="detail-label">Référence</span>
                            </div>
                            <div class="detail-content">
                                <span class="detail-ref">#1289</span>
                            </div>
                        </div>

                        <div class="detail-section" style="margin-bottom:0;">
                            <div class="detail-header">
                                <div class="detail-icon purple">🕐</div>
                                <span class="detail-label">Contraintes de temps</span>
                            </div>
                            <div class="detail-content">
                                <span class="detail-time">À livrer <span>entre 12:30 – 12:45</span></span>
                            </div>
                        </div>
                    </div>

                    <a href="06-pickup.html" class="btn-primary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" style="display:inline-block;vertical-align:middle;margin-right:8px;">
                            <path d="M3 11l19-9-9 19-2-8-8-2z"/>
                        </svg>
                        Lancer la navigation
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
