<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Food - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            padding: 40px 24px;
            background: linear-gradient(180deg, #F8F6FF 0%, var(--bg-main) 100%);
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 48px;
        }

        .auth-logo img {
            height: 80px;
            width: auto;
        }

        .auth-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 32px 24px;
            width: 100%;
            box-shadow: var(--shadow-medium);
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            padding: 4px;
        }

        .password-toggle:hover {
            color: var(--primary-purple);
        }

        .forgot-link {
            display: block;
            text-align: center;
            color: var(--primary-purple);
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            margin-top: 16px;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="phone-frame">
            <div class="phone-screen">
                <div class="screen auth-screen">
                    <div class="auth-logo">
                        <img src="logo.png" alt="Good Food">
                    </div>
                    <div class="auth-card">
                        <form action="03-overview.html" method="get">
                            <div class="form-group">
                                <label class="form-label">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="2" y="4" width="20" height="16" rx="2"/>
                                        <path d="M22 6L12 13L2 6"/>
                                    </svg>
                                    Email
                                </label>
                                <input type="email" class="form-input" placeholder="Email" value="jerome.durand@email.com">
                            </div>
                            <div class="form-group">
                                <label class="form-label">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="11" width="18" height="11" rx="2"/>
                                        <path d="M7 11V7a5 5 0 0110 0v4"/>
                                    </svg>
                                    Mot de passe
                                </label>
                                <div class="password-wrapper">
                                    <input type="password" id="password" class="form-input" placeholder="••••••••" value="password123">
                                    <button type="button" class="password-toggle" onclick="togglePassword()">
                                        <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                            <circle cx="12" cy="12" r="3"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" class="btn-primary" style="margin-bottom: 0;">Se connecter</button>
                        </form>
                        <a href="#" class="forgot-link">Mot de passe oublié</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                `;
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                `;
            }
        }
    </script>
</body>
</html>
