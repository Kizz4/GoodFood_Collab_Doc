<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Food - Chargement</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            background: linear-gradient(180deg, #F0EEFF 0%, #FFFFFF 50%, #F5F6FA 100%);
            text-align: center;
            padding: 40px 24px;
        }

        .loading-logo {
            margin-bottom: 60px;
        }

        .loading-logo img {
            height: 100px;
            width: auto;
        }

        .loading-illustration {
            margin-bottom: 40px;
        }

        .food-icons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 280px;
        }

        .food-icon {
            font-size: 48px;
            animation: bounce 2s infinite;
        }

        .food-icon:nth-child(1) { animation-delay: 0s; }
        .food-icon:nth-child(2) { animation-delay: 0.1s; }
        .food-icon:nth-child(3) { animation-delay: 0.2s; }
        .food-icon:nth-child(4) { animation-delay: 0.3s; }
        .food-icon:nth-child(5) { animation-delay: 0.4s; }
        .food-icon:nth-child(6) { animation-delay: 0.5s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #E8E8E8;
            border-top-color: var(--primary-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 40px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="phone-frame">
            <div class="phone-screen">
                <div class="screen loading-screen">
                    <div class="loading-logo">
                        <img src="logo.png" alt="Good Food">
                    </div>
                    <div class="loading-illustration">
                        <div class="food-icons">
                            <span class="food-icon">🍅</span>
                            <span class="food-icon">🥕</span>
                            <span class="food-icon">🥑</span>
                            <span class="food-icon">🥦</span>
                            <span class="food-icon">🍇</span>
                            <span class="food-icon">🍌</span>
                        </div>
                    </div>
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Redirection automatique après 3 secondes
        setTimeout(() => {
            window.location.href = '02-auth.html';
        }, 3000);
    </script>
</body>
</html>
