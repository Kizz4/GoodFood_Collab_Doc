<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Food - Nouvelle Course</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .phone-screen {
            padding-bottom: 100px;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="phone-frame">
            <div class="phone-screen">
                <div class="screen">
                    <div class="header">
                        <a href="03-overview.html" class="header-back">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 18l-6-6 6-6"/>
                            </svg>
                        </a>
                        <h1 class="header-title">Nouvelle <span>course</span></h1>
                        <a href="10-profile.html" class="avatar">
                            <div class="avatar-inner"></div>
                            <span class="avatar-badge">2</span>
                        </a>
                    </div>

                    <div class="course-card">
                        <div class="course-header">
                            <div class="restaurant-info">
                                <div class="restaurant-icon">
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#34C759" stroke-width="2">
                                        <path d="M20 6L9 17l-5-5"/>
                                    </svg>
                                </div>
                                <div>
                                    <div class="restaurant-name">Taco Loco</div>
                                    <div class="restaurant-address">22 Rue des Lilas, 75015 Paris</div>
                                </div>
                            </div>
                            <div class="gain-badge">
                                <div class="gain-label">Estimation gain</div>
                                <div class="gain-amount">€7,50</div>
                            </div>
                        </div>

                        <div class="route-info">
                            <div class="route-dot start"></div>
                            <div class="route-destination">
                                <span class="icon">📍</span>
                                <span class="route-address">12 Rue des Fleurs, <span>75003 Paris</span></span>
                            </div>
                            <div class="route-dot end"></div>
                        </div>

                        <div class="distance-info">
                            <span class="scooter-icon">🛵</span>
                            <span class="distance-text">2,1 <span>km</span> • 7 <span>min</span></span>
                        </div>
                    </div>

                    <a href="05-detail.html" class="btn-primary">Accepter</a>
                    <a href="03-overview.html" class="btn-secondary">Refuser</a>

                    <h3 class="section-title" style="margin-top: 24px;">Détails du jour</h3>
                    <div class="menu-card">
                        <a href="05-detail.html" class="menu-item">
                            <div class="menu-icon">🛵</div>
                            <span class="menu-text">Courses en cours</span>
                            <span class="menu-arrow">›</span>
                        </a>
                        <a href="#" class="menu-item">
                            <div class="menu-icon">📋</div>
                            <span class="menu-text">Historique des courses</span>
                            <span class="menu-arrow">›</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Navigation Footer -->
            <nav class="nav-footer">
                <a href="03-overview.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                        <polyline points="9,22 9,12 15,12 15,22"/>
                    </svg>
                    Accueil
                </a>
                <a href="04-new-course.html" class="active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 8v8M8 12h8"/>
                    </svg>
                    Course
                </a>
                <a href="#">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    Historique
                </a>
                <a href="10-profile.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    Profil
                </a>
            </nav>
        </div>
    </div>
</body>
</html>
